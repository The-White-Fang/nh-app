openapi: 3.0.0
info:
  title: User API
  description: User management and profile API for the web-apis project.
  version: 1.0.0
servers:
  - url: /v1
paths:
  /user/profile-picture:
    post:
      summary: Upload a profile picture
      tags:
        - User
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Profile picture uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  image:
                    type: string
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
