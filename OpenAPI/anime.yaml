openapi: 3.0.0
info:
  title: Anime API
  description: Anime content retrieval API for the web-apis project.
  version: 1.0.0
servers:
  - url: /
paths:
  /anime/filters:
    get:
      summary: Retrieve all animes filters
      tags:
        - Anime
      responses:
        '200':
          description: Successfully fetched filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  genres:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  producers:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  licensors:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  studios:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  themes:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  streaming_services:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /anime/search:
    get:
      summary: Search and filter anime
      tags:
        - Anime
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search text for title or synonyms
        - in: query
          name: genres
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: producers
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: licensors
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: studios
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: themes
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: streaming_services
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  animes:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnimeSearchRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /anime/{id}:
    get:
      summary: Retrieve detailed data for a single anime
      tags:
        - Anime
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Anime details with relations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnimeDetailRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Anime not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
              example:
                error: NOT_FOUND
                message: Anime not found
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    NameEntity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    UrlEntity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string

    AnimeSearchRecord:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
          nullable: true
        episodes:
          type: integer
          nullable: true
        image_url:
          type: string
        genres:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        synopsis:
          type: string
        type:
          type: string
          nullable: true

    AnimeDetailRecord:
      type: object
      properties:
        id:
          type: integer
        mal_url:
          type: string
        image_url:
          type: string
        trailer_url:
          type: string
          nullable: true
        trailer_thumbnail_url:
          type: string
          nullable: true
        title:
          type: string
        title_english:
          type: string
          nullable: true
        title_japanese:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        episodes:
          type: integer
          nullable: true
        status:
          type: string
          nullable: true
        air_start:
          type: string
          format: date-time
          nullable: true
        air_end:
          type: string
          format: date-time
          nullable: true
        duration:
          type: integer
        rating:
          type: string
          nullable: true
        synopsis:
          type: string
        broadcast_day:
          type: integer
          nullable: true
        broadcast_time:
          type: string
          format: date-time
          nullable: true
        extras:
          type: object
          nullable: true
        genres:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        producers:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        licensors:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        studios:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        themes:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        streaming:
          type: array
          items:
            $ref: '#/components/schemas/UrlEntity'
        synonyms:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Bad Request (Invalid parameters)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: array
                items:
                  type: string
          example:
            error: INVALID_REQUEST
            message: ["Expected number, received string"]
    InternalServerError:
      description: Internal Server Error
