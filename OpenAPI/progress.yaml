openapi: 3.0.0
info:
  title: Progress Tracking API
  description: API for tracking user progress (watched episodes for anime, read pages for sauce).
  version: 1.0.0
servers:
  - url: /

paths:
  /progress/anime/{id}:
    get:
      summary: Fetch progress for a specific anime
      tags:
        - Progress
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The anime ID
      responses:
        '200':
          description: Progress details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnimeProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update progress for a specific anime
      tags:
        - Progress
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The anime ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                episodes:
                  type: integer
                is_watched:
                  type: boolean
      responses:
        '200':
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnimeProgress'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /progress/sauce/{id}:
    get:
      summary: Fetch progress for a specific sauce
      tags:
        - Progress
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The sauce ID
      responses:
        '200':
          description: Progress details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SauceProgress'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update progress for a specific sauce
      tags:
        - Progress
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The sauce ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pages:
                  type: integer
                is_read:
                  type: boolean
      responses:
        '200':
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SauceProgress'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AnimeProgress:
      type: object
      properties:
        watched_episodes:
          type: integer
        is_watched:
          type: boolean

    SauceProgress:
      type: object
      properties:
        read_pages:
          type: integer
        is_read:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
    NotFound:
      description: Not Found
