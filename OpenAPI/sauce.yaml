openapi: 3.0.0
info:
  title: Sauce API
  description: Sauce (n_titles) content retrieval API for the web-apis project.
  version: 1.0.0
servers:
  - url: /v1
paths:
  /sauce/filters:
    get:
      summary: Retrieve all sauce filters
      tags:
        - Sauce
      responses:
        '200':
          description: Successfully fetched filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  parodies:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  artists:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  characters:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  languages:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/NameEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sauce/search:
    get:
      summary: Search and filter sauce
      tags:
        - Sauce
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search text for title
        - in: query
          name: tags
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: parodies
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: artists
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: characters
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: groups
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: languages
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: categories
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  sauces:
                    type: array
                    items:
                      $ref: '#/components/schemas/SauceSearchRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /sauce/{id}:
    get:
      summary: Retrieve detailed data for a single sauce
      tags:
        - Sauce
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sauce details with relations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SauceDetailRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Sauce not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
              example:
                error: NOT_FOUND
                message: Sauce not found
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    NameEntity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    SauceSearchRecord:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        cover:
          type: string
          nullable: true
        pages:
          type: integer
        tags:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'

    SauceDetailRecord:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        cover:
          type: string
          nullable: true
        pages:
          type: integer
        tags:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        parodies:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        artists:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        characters:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        languages:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/NameEntity'

  responses:
    BadRequest:
      description: Bad Request (Invalid parameters)
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: array
                items:
                  type: string
          example:
            error: INVALID_REQUEST
            message: ["Expected number, received string"]
    InternalServerError:
      description: Internal Server Error
