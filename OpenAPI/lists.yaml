openapi: 3.0.0
info:
  title: Anime Lists API
  description: Custom anime lists CRUD and pinning API. Scoped to anime content only.
  version: 1.0.0
servers:
  - url: /

paths:
  /anime/lists:
    post:
      summary: Create a new anime list
      tags:
        - Anime Lists
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 255
                description:
                  type: string
                  maxLength: 1024
                  nullable: true
      responses:
        '201':
          description: List created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOverview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      summary: Fetch all anime lists for the authenticated user
      tags:
        - Anime Lists
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All anime lists for the current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  lists:
                    type: array
                    items:
                      $ref: '#/components/schemas/ListOverview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /anime/lists/{id}:
    get:
      summary: Fetch a single anime list with its items
      tags:
        - Anime Lists
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: List detail with anime items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update anime list name or description
      tags:
        - Anime Lists
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                description:
                  type: string
                  maxLength: 1024
                  nullable: true
      responses:
        '200':
          description: List updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOverview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete an anime list and all its items
      tags:
        - Anime Lists
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '204':
          description: List deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /anime/lists/{id}/pin:
    patch:
      summary: Toggle pin/unpin an anime list
      tags:
        - Anime Lists
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Pin status toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_pinned:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /anime/lists/{id}/items:
    post:
      summary: Add an anime to a list
      tags:
        - Anime Lists
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - anime_id
              properties:
                anime_id:
                  type: integer
      responses:
        '201':
          description: Anime added to list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Anime already exists in the list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: DUPLICATE_ITEM
                message: This anime is already in the list
        '500':
          $ref: '#/components/responses/InternalServerError'

  /anime/lists/{id}/items/{itemId}:
    delete:
      summary: Remove an anime from a list
      tags:
        - Anime Lists
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ListId'
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Anime removed from list
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ListId:
      in: path
      name: id
      required: true
      schema:
        type: integer
      description: The anime list ID

  schemas:
    ListOverview:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        is_pinned:
          type: boolean
        is_default:
          type: boolean
        item_count:
          type: integer
          description: Total number of anime in the list
        preview_images:
          type: array
          items:
            type: string
          description: Cover images of the first 4 anime
        created_at:
          type: string
          format: date-time

    ListDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        is_pinned:
          type: boolean
        is_default:
          type: boolean
        item_count:
          type: integer
        created_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/ListItem'

    ListItem:
      type: object
      properties:
        id:
          type: integer
        anime_id:
          type: integer
        title:
          type: string
          description: Title from the anime table
        image_url:
          type: string
          description: Cover image from the anime table
        added_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Unauthorized
            message: Missing authorization header
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: NOT_FOUND
            message: List not found
    InternalServerError:
      description: Internal Server Error
